<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/images/sofa-logo.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — The Snug Spot</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:      #FAF7F2;
      --off-white:  #F5F0E8;
      --sand:       #EDE5D8;
      --deep-brown: #2C1A0E;
      --walnut:     #5C3D2E;
      --terracotta: #C4785A;
      --sage:       #8FA68A;
      --text-dark:  #1A1410;
      --text-mid:   #4A3728;
      --text-light: #8A7A6E;
      --font-display: 'Cormorant Garamond', serif;
      --font-body:    'DM Sans', sans-serif;
    }
    body { background: var(--cream); font-family: var(--font-body); color: var(--text-dark); min-height: 100vh; }

    /* ── Gate ── */
    #gate {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
    }
    .gate-logo {
      font-family: var(--font-display);
      font-size: 1.8rem; font-weight: 500;
      color: var(--deep-brown);
      text-decoration: none;
      margin-bottom: 40px;
      display: flex; align-items: center; gap: 12px;
    }
    .gate-logo span { color: var(--terracotta); }
    .gate-mark { width: 42px; height: 42px; flex-shrink: 0; border-radius: 50%; border: 1.5px solid rgba(44,26,14,.15); overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .gate-mark img { height: 42px; object-fit: contain; }
    .gate-box {
      background: white;
      border: 1px solid var(--sand);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%; max-width: 400px;
      text-align: center;
      box-shadow: 0 4px 32px rgba(44,26,14,.07);
    }
    .gate-icon { font-size: 2rem; margin-bottom: 16px; }
    .gate-box h2 {
      font-family: var(--font-display);
      font-size: 1.6rem; font-weight: 400;
      color: var(--deep-brown); margin-bottom: 8px;
    }
    .gate-box p { font-size: 13px; color: var(--text-light); margin-bottom: 28px; }
    .pw-wrap { position: relative; margin-bottom: 14px; }
    .pw-wrap input { margin-bottom: 0; padding-right: 44px; width: 100%; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 4px;
      color: var(--text-light); transition: color .2s;
    }
    .pw-toggle:hover { color: var(--terracotta); }
    .pw-toggle svg { width: 18px; height: 18px; display: block; }
    .gate-box input {
      width: 100%; padding: 12px 16px;
      border: 1px solid var(--sand);
      border-radius: 8px; font-size: 15px;
      font-family: var(--font-body);
      color: var(--text-dark);
      background: var(--cream);
      outline: none; margin-bottom: 14px;
      letter-spacing: .08em;
      transition: border-color .2s;
    }
    .gate-box input:focus { border-color: var(--terracotta); }
    .gate-btn {
      width: 100%; padding: 13px;
      background: var(--deep-brown); color: var(--cream);
      border: none; border-radius: 8px;
      font-family: var(--font-body); font-size: 13px;
      font-weight: 500; letter-spacing: .08em;
      text-transform: uppercase; cursor: pointer;
      transition: background .2s;
    }
    .gate-btn:hover { background: var(--walnut); }
    .gate-error {
      font-size: 12px; color: #c0392b;
      margin-top: 12px; display: none;
    }

    /* ── Dashboard ── */
    #dashboard { display: none; }

    .dash-nav {
      background: var(--deep-brown);
      padding: 0 48px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .dash-nav-logo {
      font-family: var(--font-display);
      font-size: 1.4rem; font-weight: 500;
      color: var(--cream); text-decoration: none;
    }
    .dash-nav-logo span { color: var(--terracotta); }
    .dash-nav-right { display: flex; align-items: center; gap: 20px; }
    .dash-badge {
      font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
      background: var(--terracotta); color: white;
      padding: 4px 10px; border-radius: 20px;
    }
    .dash-back {
      font-size: 13px; color: rgba(250,247,242,.6);
      text-decoration: none; transition: color .2s;
    }
    .dash-back:hover { color: var(--cream); }

    .dash-hero {
      background: var(--off-white);
      border-bottom: 1px solid var(--sand);
      padding: 48px 48px 0;
    }
    .dash-hero h1 {
      font-family: var(--font-display);
      font-size: 2.4rem; font-weight: 300;
      color: var(--deep-brown); margin-bottom: 8px;
    }
    .dash-hero > p { color: var(--text-light); font-size: 14px; }

    .dash-stats {
      display: flex; gap: 36px; margin-top: 28px;
    }
    .dash-stat { text-align: left; }
    .dash-stat-n {
      font-family: var(--font-display);
      font-size: 2.2rem; font-weight: 500;
      color: var(--terracotta); display: block; line-height: 1;
    }
    .dash-stat-l { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-light); margin-top: 4px; display: block; }

    /* ── Tabs ── */
    .dash-tabs { display: flex; gap: 0; margin-top: 32px; border-bottom: 2px solid var(--sand); }
    .dash-tab {
      padding: 12px 28px; background: none; border: none;
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--text-light); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: color .2s, border-color .2s;
    }
    .dash-tab.active { color: var(--terracotta); border-bottom-color: var(--terracotta); }
    .dash-tab:hover:not(.active) { color: var(--text-mid); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Orders Tab ── */
    .orders-wrap { max-width: 1200px; margin: 0 auto; padding: 48px; }
    .orders-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .orders-filter { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 16px; border: 1px solid var(--sand); border-radius: 20px;
      background: none; font-size: 12px; font-weight: 500; cursor: pointer;
      color: var(--text-mid); transition: all .2s; font-family: var(--font-body);
    }
    .filter-btn.active { background: var(--deep-brown); border-color: var(--deep-brown); color: var(--cream); }
    .filter-btn:hover:not(.active) { border-color: var(--walnut); color: var(--walnut); }
    .refresh-btn {
      padding: 8px 18px; background: var(--off-white);
      border: 1px solid var(--sand); border-radius: 8px;
      font-size: 12px; cursor: pointer; color: var(--text-mid);
      transition: background .2s; display: flex; align-items: center; gap: 6px;
      font-family: var(--font-body);
    }
    .refresh-btn:hover { background: var(--sand); }
    .orders-table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--sand); }
    .orders-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .orders-table th {
      background: var(--off-white); padding: 12px 16px; text-align: left;
      font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
      color: var(--text-light); border-bottom: 1px solid var(--sand); white-space: nowrap;
      font-weight: 500;
    }
    .orders-table td { padding: 14px 16px; border-bottom: 1px solid var(--sand); vertical-align: top; color: var(--text-dark); }
    .orders-table tr:last-child td { border-bottom: none; }
    .orders-table tbody tr:hover td { background: var(--off-white); cursor: pointer; }
    .status-pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; }
    .status-confirmed { background: rgba(143,166,138,.18); color: #4a7c4e; }
    .status-paid { background: rgba(39,174,96,.15); color: #1e8449; }
    .status-pending { background: rgba(196,120,90,.12); color: var(--terracotta); }
    .status-shipped { background: rgba(52,152,219,.12); color: #2471a3; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .8s linear infinite; }
    .order-items-list { font-size: 12px; color: var(--text-light); line-height: 1.7; }
    .order-id { font-family: monospace; font-size: 12px; color: var(--text-light); }
    .no-orders {
      text-align: center; padding: 80px 20px; color: var(--text-light);
    }
    .no-orders-icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
    .no-orders h3 { font-family: var(--font-display); font-size: 1.4rem; font-weight: 400; color: var(--text-mid); margin-bottom: 8px; }
    .no-orders p { font-size: 13px; }
    .order-detail-row, .order-detail { display: none; }
    .order-detail-row.open, .order-detail.open { display: table-row; }
    .order-detail-row td, .order-detail td { background: var(--off-white); padding: 20px 24px; font-size: 12.5px; border-bottom: 1px solid var(--sand); }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
    .od-block { }
    .od-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-light); display: block; margin-bottom: 4px; }
    .od-val { font-size: 13px; color: var(--text-dark); font-weight: 500; }
    .detail-field label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-light); display: block; margin-bottom: 4px; }
    .detail-field p { font-size: 13px; color: var(--text-dark); font-weight: 500; }
    .order-items-detail { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--sand); }
    .order-item-row { display: flex; justify-content: space-between; font-size: 12.5px; padding: 5px 0; color: var(--text-mid); border-bottom: 1px solid rgba(237,229,216,.5); }
    .order-item-row:last-child { border-bottom: none; }

    /* ── Sourcing Tab ── */
    .dash-body { max-width: 1200px; margin: 0 auto; padding: 48px; }

    .section-label {
      font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--terracotta); margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--sand); }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px; margin-bottom: 56px;
    }
    .product-card {
      background: white; border: 1px solid var(--sand);
      border-radius: 12px; overflow: hidden; transition: box-shadow .2s;
    }
    .product-card:hover { box-shadow: 0 4px 24px rgba(44,26,14,.08); }

    .pc-head {
      padding: 20px 20px 16px; border-bottom: 1px solid var(--sand);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    }
    .pc-name { font-family: var(--font-display); font-size: 1.2rem; font-weight: 500; color: var(--deep-brown); line-height: 1.2; }
    .pc-cat { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-light); margin-top: 4px; }
    .pc-price-wrap { text-align: right; flex-shrink: 0; }
    .pc-retail { font-size: 18px; font-weight: 500; color: var(--terracotta); }
    .pc-retail-label { font-size: 10px; color: var(--text-light); text-transform: uppercase; letter-spacing: .08em; }

    .pc-body { padding: 16px 20px; }
    .pc-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
    .pc-row-label { color: var(--text-light); }
    .pc-row-val { color: var(--text-dark); font-weight: 500; }
    .pc-row-val.green { color: #27ae60; }

    .pc-links { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 8px; }
    .ali-link {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; background: var(--cream);
      border: 1px solid var(--sand); border-radius: 8px;
      text-decoration: none; font-size: 12.5px; color: var(--walnut);
      transition: background .2s, border-color .2s;
    }
    .ali-link:hover { background: var(--off-white); border-color: var(--terracotta); color: var(--terracotta); }
    .ali-link svg { width: 14px; height: 14px; flex-shrink: 0; }
    .ali-link .link-label { font-weight: 500; flex: 1; }
    .ali-link .link-type { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-light); }

    .pc-tip {
      margin: 0 20px 16px; padding: 10px 14px;
      background: rgba(143,166,138,.1); border-radius: 8px;
      font-size: 12px; color: var(--text-mid); line-height: 1.6;
    }
    .pc-tip strong { color: var(--walnut); }

    .pc-shop-link {
      margin: 0 20px 8px; display: flex; align-items: center; gap: 8px;
      padding: 9px 14px; background: rgba(44,26,14,.04);
      border: 1px solid rgba(44,26,14,.12); border-radius: 8px;
      text-decoration: none; font-size: 12px; color: var(--deep-brown);
      font-weight: 500; transition: background .2s;
    }
    .pc-shop-link:hover { background: rgba(44,26,14,.08); }
    .pc-shop-link svg { width: 13px; height: 13px; flex-shrink: 0; }

    @media (max-width: 640px) {
      .dash-nav { padding: 0 20px; }
      .dash-hero { padding: 32px 20px 0; }
      .dash-body, .orders-wrap { padding: 32px 20px; }
      .product-grid { grid-template-columns: 1fr; }
      .dash-stats { gap: 20px; flex-wrap: wrap; }
      .dash-tabs { overflow-x: auto; }
    }
  </style>
</head>
<body>

<!-- ── GATE ── -->
<div id="gate">
  <a href="/" class="gate-logo"><span class="gate-mark"><img src="/images/sofa-logo.png" alt="The Snug Spot"/></span>The Snug<span>Spot</span></a>
  <div class="gate-box">
    <div class="gate-icon">🔒</div>
    <h2>Internal Access</h2>
    <p>This page is private. Enter the password to continue.</p>
    <div class="pw-wrap">
      <input type="password" id="pwInput" placeholder="Password" autocomplete="off"/>
      <button class="pw-toggle" onclick="togglePw()" tabindex="-1" id="pwToggle" aria-label="Show password">
        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <button class="gate-btn" onclick="checkPassword()">Enter</button>
    <p class="gate-error" id="gateError">Incorrect password. Please try again.</p>
  </div>
</div>

<script>
  /* ─── Secure Auth (AES-256-GCM) ─── */
  const PW_HASH = '819423a698f9ea9ba3577f20993cb0da98a79ea22ce5d6550b65b69fb36fd438';
  let attempts = 0;
  let lockoutUntil = 0;

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function deriveKey(password, salt) {
    const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:100000, hash:'SHA-256'}, keyMaterial, {name:'AES-GCM', length:256}, false, ['decrypt']);
  }

  async function decryptDashboard(password) {
    try {
      const b64 = document.getElementById('enc-payload').textContent;
      const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const salt = raw.slice(0, 16);
      const iv = raw.slice(16, 28);
      const authTag = raw.slice(28, 44);
      const ciphertext = raw.slice(44);
      const combined = new Uint8Array(ciphertext.length + 16);
      combined.set(ciphertext);
      combined.set(authTag, ciphertext.length);
      const key = await deriveKey(password, salt);
      const decrypted = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, combined);
      return new TextDecoder().decode(decrypted);
    } catch(e) {
      return null;
    }
  }

  async function checkPassword() {
    if (Date.now() < lockoutUntil) {
      const secs = Math.ceil((lockoutUntil - Date.now()) / 1000);
      document.getElementById('gateError').textContent = 'Too many attempts. Wait ' + secs + 's.';
      document.getElementById('gateError').style.display = 'block';
      return;
    }

    const val = document.getElementById('pwInput').value;
    const hash = await sha256(val);

    if (hash === PW_HASH) {
      const dashHTML = await decryptDashboard(val);
      if (dashHTML) {
        const container = document.createElement('div');
        container.innerHTML = dashHTML;
        const dashEl = container.querySelector('#dashboard') || container.firstElementChild;
        // The decrypted content IS the dashboard div, inject its innerHTML
        document.getElementById('dashboard').innerHTML = dashEl ? dashEl.innerHTML : container.innerHTML;
        document.getElementById('gate').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        sessionStorage.setItem('cn_sourcing', hash);
        loadOrders();
      }
    } else {
      attempts++;
      if (attempts >= 5) {
        lockoutUntil = Date.now() + 60000;
        document.getElementById('gateError').textContent = 'Too many attempts. Locked for 60s.';
      } else {
        document.getElementById('gateError').textContent = 'Incorrect password. ' + (5 - attempts) + ' attempts left.';
      }
      document.getElementById('gateError').style.display = 'block';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    }
  }

  // Override checkPassword — no plaintext caching in sessionStorage
  checkPassword = async function() {
    const val = document.getElementById('pwInput').value;
    const hash = await sha256(val);
    if (hash === PW_HASH) {
      const dashHTML = await decryptDashboard(val);
      if (dashHTML) {
        const temp = document.createElement('div');
        temp.innerHTML = dashHTML;
        const inner = temp.querySelector('#dashboard');
        const content = inner ? inner.innerHTML : temp.innerHTML;
        document.getElementById('dashboard').innerHTML = content;
        document.getElementById('gate').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadOrders();
        return;
      }
    }
    // Fall through to error handling
    if (Date.now() < lockoutUntil) {
      const secs = Math.ceil((lockoutUntil - Date.now()) / 1000);
      document.getElementById('gateError').textContent = 'Too many attempts. Wait ' + secs + 's.';
      document.getElementById('gateError').style.display = 'block';
      return;
    }
    attempts++;
    if (attempts >= 5) {
      lockoutUntil = Date.now() + 60000;
      document.getElementById('gateError').textContent = 'Too many attempts. Locked for 60s.';
    } else {
      document.getElementById('gateError').textContent = 'Incorrect password. ' + (5 - attempts) + ' attempts left.';
    }
    document.getElementById('gateError').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  };

  function togglePw() {
    const inp = document.getElementById('pwInput');
    const icon = document.getElementById('eyeIcon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      inp.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
    inp.focus();
  }

  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  /* ─── Tabs ─── */
  function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.dash-tab').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    document.getElementById('tab-btn-' + name).classList.add('active');
  }

  /* ─── Orders System ─── */
  let allOrders = [];
  let currentFilter = 'all';
  let searchQuery = '';
  const API = window.location.origin;
  function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
  const STATUSES = ['confirmed','processing','shipped','delivered'];

  /* Normalize order data from API or localStorage */
  function normalizeOrder(o) {
    const c = o.customer || {};
    const isObj = typeof c === 'object' && c !== null;
    return {
      id:       o.id || 'N/A',
      date:     o.createdAt || o.date || null,
      name:     isObj ? ((c.firstName||'')+' '+(c.lastName||'')).trim() : (o.name || c || '—'),
      email:    isObj ? (c.email||'') : (o.email || ''),
      address:  isObj ? [c.address, c.city, c.postcode, c.country].filter(Boolean).join(', ') : (o.address || o.shipping || ''),
      phone:    isObj ? (c.phone||'') : (o.phone || ''),
      items:    o.items || o.cart || [],
      subtotal: parseFloat(o.subtotal) || 0,
      shipping: parseFloat(o.shipping) || 0,
      total:    parseFloat(o.total) || 0,
      status:   (o.status || 'confirmed').toLowerCase(),
      notes:    o.notes || '',
      tracking: o.trackingNumber || '',
      trackingUrl: o.trackingUrl || '',
      demoMode: o.demoMode || false,
      raw: o
    };
  }

  /* Load orders — try API first, fallback to localStorage */
  async function loadOrders() {
    const btn = document.getElementById('refreshBtn');
    const status = document.getElementById('apiStatus');
    if (btn) btn.innerHTML = '<svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Loading…';

    try {
      const res = await fetch(API + '/api/orders', { cache: 'no-store' });
      if (!res.ok) throw new Error('API ' + res.status);
      const apiOrders = await res.json();
      allOrders = apiOrders.map(normalizeOrder);
      if (status) { status.style.display = 'block'; status.style.background = 'rgba(143,166,138,.15)'; status.style.color = '#4a7c4e'; status.innerHTML = '🟢 Connected to server — ' + allOrders.length + ' orders loaded from API'; }
      setTimeout(() => { if(status) status.style.display='none'; }, 3000);
    } catch (e) {
      try {
        const local = JSON.parse(localStorage.getItem('snugspot_orders') || '[]');
        allOrders = local.map(normalizeOrder);
        if (status) { status.style.display = 'block'; status.style.background = 'rgba(196,120,90,.12)'; status.style.color = 'var(--terracotta)'; status.innerHTML = '🟡 Offline — showing ' + allOrders.length + ' orders from local cache'; }
      } catch (e2) {
        allOrders = [];
        if (status) { status.style.display = 'block'; status.style.background = 'rgba(192,57,43,.1)'; status.style.color = '#c0392b'; status.innerHTML = '🔴 Could not load orders'; }
      }
    }

    if (btn) btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Refresh';
    updateStats();
    applyFilters();
  }

  function updateStats() {
    const active = allOrders.filter(o => o.status !== 'archived');
    const revenue = active.reduce((s, o) => s + o.total, 0);
    const itemsSold = active.reduce((s, o) => s + o.items.reduce((ss, it) => ss + (it.qty||1), 0), 0);
    const avg = active.length ? revenue / active.length : 0;
    const el = id => document.getElementById(id);
    if (el('statOrders'))  el('statOrders').textContent = active.length;
    if (el('statRevenue')) el('statRevenue').textContent = '£' + revenue.toFixed(2);
    if (el('statAvgOrder'))el('statAvgOrder').textContent = '£' + avg.toFixed(2);
    if (el('statItems'))   el('statItems').textContent = itemsSold;
  }

  function applyFilters() {
    let filtered = allOrders.filter(o => o.status !== 'archived');
    if (currentFilter !== 'all') filtered = filtered.filter(o => o.status === currentFilter);
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(o =>
        o.id.toLowerCase().includes(q) ||
        o.name.toLowerCase().includes(q) ||
        o.email.toLowerCase().includes(q) ||
        o.items.some(it => (it.name||'').toLowerCase().includes(q))
      );
    }
    renderOrders(filtered);
  }

  function filterOrders(type) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('filter-' + type);
    if (btn) btn.classList.add('active');
    applyFilters();
  }

  function searchOrders(q) {
    searchQuery = q;
    applyFilters();
  }

  /* Update order status via API */
  async function updateStatus(orderId, newStatus, event) {
    if (event) event.stopPropagation();
    try {
      const res = await fetch(API + '/api/orders/' + orderId, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus })
      });
      if (!res.ok) throw new Error('Update failed');
      await loadOrders();
    } catch (e) {
      const order = allOrders.find(o => o.id === orderId);
      if (order) { order.status = newStatus; order.raw.status = newStatus; }
      try { localStorage.setItem('snugspot_orders', JSON.stringify(allOrders.map(o => o.raw))); } catch(x){}
      applyFilters();
    }
  }

  /* Add tracking info */
  async function addTracking(orderId, event) {
    if (event) event.stopPropagation();
    const num = prompt('Enter tracking number:');
    if (!num) return;
    const url = prompt('Tracking URL (optional):') || '';
    try {
      await fetch(API + '/api/orders/' + orderId, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ trackingNumber: num, trackingUrl: url, status: 'shipped' })
      });
      await loadOrders();
    } catch (e) { alert('Failed to save tracking'); }
  }

  /* Add order notes */
  async function addNote(orderId, event) {
    if (event) event.stopPropagation();
    const order = allOrders.find(o => o.id === orderId);
    const note = prompt('Order notes:', order ? order.notes : '');
    if (note === null) return;
    try {
      await fetch(API + '/api/orders/' + orderId, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ notes: note })
      });
      await loadOrders();
    } catch (e) { alert('Failed to save note'); }
  }

  /* Archive order */
  async function archiveOrder(orderId, event) {
    if (event) event.stopPropagation();
    if (!confirm('Archive order ' + orderId + '?')) return;
    try {
      await fetch(API + '/api/orders/' + orderId, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'archived' })
      });
      await loadOrders();
    } catch (e) { alert('Failed to archive order'); }
  }

  /* Export CSV */
  function exportCSV() {
    if (!allOrders.length) return alert('No orders to export');
    const headers = ['Order ID','Date','Customer','Email','Address','Items','Subtotal','Shipping','Total','Status','Tracking','Notes'];
    const rows = allOrders.filter(o=>o.status!=='archived').map(o => [
      o.id,
      o.date ? new Date(o.date).toLocaleDateString('en-GB') : '',
      '"'+o.name.replace(/"/g,'""')+'"',
      o.email,
      '"'+o.address.replace(/"/g,'""')+'"',
      '"'+o.items.map(it=>(it.name||'?')+' x'+(it.qty||1)).join('; ').replace(/"/g,'""')+'"',
      o.subtotal.toFixed(2),
      o.shipping.toFixed(2),
      o.total.toFixed(2),
      o.status,
      o.tracking,
      '"'+(o.notes||'').replace(/"/g,'""')+'"'
    ]);
    const csv = [headers.join(','), ...rows.map(r=>r.join(','))].join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'snugspot-orders-'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();
  }

  /* Render orders table */
  function renderOrders(orders) {
    const tbody = document.getElementById('ordersBody');
    if (!tbody) return;
    if (!orders || orders.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7"><div class="no-orders"><div class="no-orders-icon">📭</div><h3>No orders yet</h3><p>Orders will appear here once customers check out from the shop.</p></div></td></tr>';
      return;
    }
    tbody.innerHTML = orders.map((o, i) => {
      const date = o.date ? new Date(o.date).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
      const statusColors = { confirmed:'status-confirmed', processing:'status-pending', shipped:'status-shipped', delivered:'status-paid', paid:'status-paid' };
      const statusClass = statusColors[o.status] || 'status-confirmed';
      const itemsSummary = o.items.length ? o.items.map(it => esc(it.name||'?') + ' ×' + (it.qty||1)).join('<br>') : '—';

      /* Status dropdown */
      const statusOpts = STATUSES.map(s => '<option value="'+s+'"'+(s===o.status?' selected':'')+'>'+s.charAt(0).toUpperCase()+s.slice(1)+'</option>').join('');
      const statusSelect = '<select onchange="updateStatus(\''+o.id+'\',this.value,event)" style="padding:4px 8px;border:1px solid var(--sand);border-radius:6px;font-size:11px;font-family:var(--font-body);background:white;cursor:pointer">'+statusOpts+'</select>';

      /* Action buttons */
      const actions = '<div style="display:flex;gap:4px;flex-wrap:wrap">' +
        '<button onclick="addTracking(\''+o.id+'\',event)" title="Add tracking" style="padding:4px 8px;border:1px solid var(--sand);border-radius:6px;font-size:11px;background:white;cursor:pointer;font-family:var(--font-body)">📦 Track</button>' +
        '<button onclick="addNote(\''+o.id+'\',event)" title="Add note" style="padding:4px 8px;border:1px solid var(--sand);border-radius:6px;font-size:11px;background:white;cursor:pointer;font-family:var(--font-body)">📝 Note</button>' +
        '<button onclick="archiveOrder(\''+o.id+'\',event)" title="Archive" style="padding:4px 8px;border:1px solid var(--sand);border-radius:6px;font-size:11px;background:white;cursor:pointer;color:#c0392b;font-family:var(--font-body)">🗑</button>' +
        '</div>';

      /* Detail items */
      const detailItems = o.items.length ? o.items.map(it =>
        '<div class="order-item-row"><span>'+esc(it.name||'?')+'</span><span>×'+(it.qty||1)+' — £'+((it.price||0)*(it.qty||1)).toFixed(2)+'</span></div>'
      ).join('') : '';

      /* Tracking display */
      const trackingHTML = o.tracking ? '<div class="od-block"><div class="od-label">Tracking</div><div class="od-val">' +
        (o.trackingUrl ? '<a href="'+esc(o.trackingUrl)+'" target="_blank" style="color:var(--terracotta)">'+esc(o.tracking)+'</a>' : esc(o.tracking)) +
        '</div></div>' : '';

      /* Notes display */
      const notesHTML = o.notes ? '<div class="od-block"><div class="od-label">Notes</div><div class="od-val" style="font-style:italic">'+esc(o.notes)+'</div></div>' : '';

      return '<tr onclick="toggleDetail('+i+')" style="cursor:pointer">' +
        '<td><span class="order-id">'+o.id+'</span></td>' +
        '<td style="white-space:nowrap">'+date+'</td>' +
        '<td><strong>'+esc(o.name)+'</strong>'+(o.email?'<br><span style="font-size:11px;color:var(--text-light)">'+esc(o.email)+'</span>':'')+'</td>' +
        '<td><span class="order-items-list">'+itemsSummary+'</span></td>' +
        '<td style="font-weight:500">£'+o.total.toFixed(2)+'</td>' +
        '<td>'+statusSelect+'</td>' +
        '<td>'+actions+'</td>' +
        '</tr>' +
        '<tr class="order-detail" id="detail-'+i+'">' +
        '<td colspan="7">' +
        '<div class="detail-grid">' +
          '<div class="od-block"><div class="od-label">Customer</div><div class="od-val">'+esc(o.name)+'</div></div>' +
          (o.email?'<div class="od-block"><div class="od-label">Email</div><div class="od-val"><a href="mailto:'+esc(o.email)+'" style="color:var(--terracotta)">'+esc(o.email)+'</a></div></div>':'') +
          (o.phone?'<div class="od-block"><div class="od-label">Phone</div><div class="od-val">'+esc(o.phone)+'</div></div>':'') +
          (o.address?'<div class="od-block"><div class="od-label">Address</div><div class="od-val">'+esc(o.address)+'</div></div>':'') +
          '<div class="od-block"><div class="od-label">Subtotal</div><div class="od-val">£'+o.subtotal.toFixed(2)+'</div></div>' +
          '<div class="od-block"><div class="od-label">Shipping</div><div class="od-val">'+(o.shipping>0?'£'+o.shipping.toFixed(2):'Free')+'</div></div>' +
          trackingHTML + notesHTML +
        '</div>' +
        (detailItems?'<div class="order-items-detail"><div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-light);margin-bottom:8px">Order Items</div>'+detailItems+'</div>':'') +
        '</td></tr>';
    }).join('');
  }

  function toggleDetail(i) {
    const row = document.getElementById('detail-' + i);
    if (row) row.classList.toggle('open');
  }
</script>
</body>
</html>
